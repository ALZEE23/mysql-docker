services:
  mysql:
    image: mysql:8.0
    container_name: rumah_sakit_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rumah_sakit_db
      MYSQL_USER: rumah_sakit_user
      MYSQL_PASSWORD: rumah_sakit_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
